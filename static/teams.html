<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Команды — Astana PGL 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Chakra+Petch:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .page-hero {
      padding: 80px 40px 40px;
      background: linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--border);
    }
    .page-hero-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: .3em; color: var(--accent); margin-bottom: 8px; }
    .page-hero-label::before { content: '// '; }
    .page-hero-title { font-size: clamp(48px, 8vw, 100px); }
    .page-hero-count { font-family: var(--font-mono); font-size: 12px; color: var(--text3); margin-top: 8px; }
    .teams-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .region-header {
      grid-column: 1 / -1;
      display: flex; align-items: center; gap: 16px;
      padding: 24px 0 8px;
      font-family: var(--font-mono); font-size: 10px; letter-spacing: .3em; color: var(--text3);
    }
    .region-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .search-bar {
      display: flex; gap: 12px; align-items: center; margin-bottom: 32px;
      background: var(--panel); border: 1px solid var(--border); padding: 12px 16px;
    }
    .search-bar input {
      background: none; border: none; outline: none; color: var(--text);
      font-family: var(--font-mono); font-size: 13px; flex: 1;
    }
    .search-bar input::placeholder { color: var(--text3); }
    .search-icon { color: var(--text3); font-size: 16px; }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <div class="page-hero">
    <div class="page-hero-label">УЧАСТНИКИ ТУРНИРА</div>
    <h1 class="page-hero-title">КОМАНДЫ</h1>
    <div class="page-hero-count" id="teamsCount">Загрузка...</div>
  </div>

  <div class="section">
    <div class="search-bar">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="ПОИСК ПО НАЗВАНИЮ ИЛИ РЕГИОНУ..."/>
    </div>
    <div class="filter-bar" id="regionFilter"></div>
    <div id="teamsContainer" class="teams-grid stagger"></div>
  </div>

  <div id="footer-placeholder"></div>
  <script src="js/utils.js"></script>
  <script>
    document.getElementById('nav-placeholder').innerHTML = renderNav();
    document.getElementById('footer-placeholder').innerHTML = renderFooter();

    let allTeams = [];
    let activeRegion = 'ALL';

    function renderTeams(teams) {
      const container = document.getElementById('teamsContainer');
      if (!teams.length) {
        container.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🔍</div>Команды не найдены</div>';
        return;
      }
      container.innerHTML = teams.map(t => `
        <a href="/static/team.html?slug=${t.slug}" class="card team-card fade-in">
          <img class="team-card-logo" src="${logoSrc(t.logo_url)}" alt="${t.name}" onerror="this.style.opacity='.3'"/>
          <div class="team-card-name">${t.name}</div>
          <div class="team-card-region" style="margin-top:6px">
            ${t.country_code ? `<img class="team-card-flag" src="/static/flags/${t.country_code.toLowerCase()}.svg" alt="" onerror="this.style.display='none'"/>` : ''}
            ${t.short_name||''} · ${t.region||''}
          </div>
        </a>`).join('');
    }

    function filterTeams() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      let filtered = allTeams;
      if (activeRegion !== 'ALL') filtered = filtered.filter(t => t.region === activeRegion);
      if (q) filtered = filtered.filter(t => t.name.toLowerCase().includes(q) || (t.region||'').toLowerCase().includes(q) || (t.short_name||'').toLowerCase().includes(q));
      renderTeams(filtered);
    }

    async function loadTeams() {
      const container = document.getElementById('teamsContainer');
      renderLoading(container);
      try {
        allTeams = await apiFetch('/teams');
        document.getElementById('teamsCount').textContent = `${allTeams.length} команд${allTeams.length===1?'а':allTeams.length<5?'ы':''}`;

        // Region filters
        const regions = ['ALL', ...new Set(allTeams.map(t => t.region).filter(Boolean))];
        document.getElementById('regionFilter').innerHTML = regions.map(r => `
          <button class="filter-btn${r==='ALL'?' active':''}" data-region="${r}">${r==='ALL'?'ВСЕ':r}</button>
        `).join('');

        document.getElementById('regionFilter').addEventListener('click', e => {
          const btn = e.target.closest('.filter-btn');
          if (!btn) return;
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeRegion = btn.dataset.region;
          filterTeams();
        });

        document.getElementById('searchInput').addEventListener('input', filterTeams);
        renderTeams(allTeams);
      } catch(e) {
        renderError(container, 'Не удалось загрузить команды');
      }
    }

    loadTeams();
  </script>
</body>
</html>

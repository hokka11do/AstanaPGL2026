<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Матч — Astana PGL 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Chakra+Petch:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .match-hero-wrap {
      background: var(--panel); border-bottom: 1px solid var(--border);
      padding: 100px 40px 48px; position: relative; overflow: hidden;
    }
    .match-hero-wrap-bg {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 80% at 50% 100%, rgba(0,229,255,.05) 0%, transparent 70%);
    }
    .match-hero-inner { max-width: 1300px; margin: 0 auto; position: relative; }
    .match-scoreboard {
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; gap: 24px; text-align: center;
    }
    .ms-team { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .ms-logo { width: 90px; height: 90px; object-fit: contain; filter: drop-shadow(0 0 24px rgba(0,229,255,.2)); }
    .ms-name { font-size: clamp(28px, 4vw, 56px); }
    .ms-flag { width: 24px; height: 18px; object-fit: cover; border-radius: 2px; }
    .ms-region { font-family: var(--font-mono); font-size: 10px; color: var(--text3); letter-spacing: .15em; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .ms-center { text-align: center; }
    .ms-score { font-family: var(--font-head); font-size: clamp(64px, 12vw, 140px); color: var(--accent); line-height: 1; }
    .ms-score.tbd { color: var(--text3); font-size: clamp(32px, 5vw, 60px); letter-spacing: .2em; }
    .ms-vs { font-family: var(--font-mono); font-size: 11px; letter-spacing: .3em; color: var(--text3); margin-bottom: 8px; }
    .ms-meta { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; margin-top: 16px; }
    .ms-badge { font-family: var(--font-mono); font-size: 10px; letter-spacing: .15em; padding: 4px 12px; border: 1px solid var(--border2); color: var(--text2); }
    .winner-banner {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      background: rgba(0,229,255,.05); border: 1px solid rgba(0,229,255,.15);
      padding: 12px 24px; margin-top: 24px;
      font-family: var(--font-mono); font-size: 12px; letter-spacing: .2em; color: var(--accent);
    }
    .winner-logo { width: 24px; height: 24px; object-fit: contain; }

    .maps-section { background: var(--bg2); border-bottom: 1px solid var(--border); }
    .maps-tabs { display: flex; overflow-x: auto; border-bottom: 1px solid var(--border); }
    .map-tab {
      flex-shrink: 0; padding: 16px 24px; cursor: pointer;
      font-family: var(--font-mono); font-size: 11px; letter-spacing: .1em; color: var(--text3);
      border-bottom: 2px solid transparent; transition: all .2s; background: none; border-top: none; border-left: none; border-right: none;
    }
    .map-tab:hover { color: var(--text); }
    .map-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .map-tab-score { font-family: var(--font-head); font-size: 16px; color: var(--text); margin-left: 8px; }
    .map-content { padding: 32px 40px; max-width: 1300px; margin: 0 auto; display: none; }
    .map-content.active { display: block; }
    .map-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; }
    .map-title { font-size: 48px; }
    .map-pick-info { font-family: var(--font-mono); font-size: 11px; color: var(--text3); }
    .map-scoreline {
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; gap: 16px; margin-bottom: 32px;
      background: var(--panel); border: 1px solid var(--border); padding: 20px 24px;
    }
    .msl-team { display: flex; align-items: center; gap: 10px; font-family: var(--font-head); font-size: 24px; }
    .msl-team.right { flex-direction: row-reverse; }
    .msl-logo { width: 36px; height: 36px; object-fit: contain; }
    .msl-score { font-family: var(--font-head); font-size: 48px; color: var(--accent); text-align: center; }
    .msl-score.winner-score { color: var(--accent); }
    .msl-score.loser-score { color: var(--text3); }

    .stats-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .stats-team-logo { width: 28px; height: 28px; object-fit: contain; }
    .stats-team-name { font-family: var(--font-head); font-size: 22px; }

    @media(max-width:768px) {
      .match-scoreboard { grid-template-columns: 1fr; }
      .ms-score { font-size: 64px; }
      .map-content { padding: 20px; }
      .map-scoreline { grid-template-columns: 1fr; }
      .msl-team.right { flex-direction: row; }
    }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>
  <div id="main"></div>
  <div id="footer-placeholder"></div>

  <script src="js/utils.js"></script>
  <script>
    document.getElementById('nav-placeholder').innerHTML = renderNav();
    document.getElementById('footer-placeholder').innerHTML = renderFooter();

    const params = new URLSearchParams(location.search);
    const matchId = params.get('id');

    function statsTableHtml(players, team) {
      if (!players || !players.length) return '<div class="empty">Нет статистики</div>';
      return `
        <div class="stats-header">
          <img class="stats-team-logo" src="${logoSrc(team?.logo_url)}" alt="" onerror="this.style.opacity='.3'"/>
          <span class="stats-team-name">${team?.name||''}</span>
          ${team?.country_code ? `<img style="width:18px;height:13px;object-fit:cover;border-radius:2px" src="/static/flags/${team.country_code.toLowerCase()}.svg" onerror="this.style.display='none'"/>` : ''}
        </div>
        <div class="table-wrap" style="margin-bottom:32px">
          <table>
            <thead>
              <tr>
                <th>ИГРОК</th>
                <th>K</th><th>D</th><th>A</th>
                <th>ADR</th><th>KAST%</th><th>HS%</th>
                <th>RATING</th>
              </tr>
            </thead>
            <tbody>
              ${players.map(p => `
                <tr>
                  <td>
                    <div style="display:flex;align-items:center;gap:10px">
                      <img style="width:28px;height:28px;border-radius:2px;object-fit:cover" src="${logoSrc(p.photo_url)}" onerror="this.style.opacity='.3'"/>
                      <div>
                        <div class="td-nick">${p.nickname}</div>
                        <div style="font-size:11px;color:var(--text3)">${p.real_name||''}</div>
                      </div>
                    </div>
                  </td>
                  <td class="td-num">${p.kills??'—'}</td>
                  <td class="td-num">${p.deaths??'—'}</td>
                  <td class="td-num">${p.assists??'—'}</td>
                  <td class="td-num">${p.adr!=null?Number(p.adr).toFixed(1):'—'}</td>
                  <td class="td-num">${p.kast!=null?Number(p.kast).toFixed(1)+'%':'—'}</td>
                  <td class="td-num">${p.hs_percentage!=null?Number(p.hs_percentage).toFixed(1)+'%':'—'}</td>
                  <td class="td-num ${ratingClass(p.rating)}">${p.rating!=null?Number(p.rating).toFixed(2):'—'}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
    }

    async function loadMapStats(matchId, mapId, panelEl, t1, t2) {
      renderLoading(panelEl);
      try {
        const data = await apiFetch(`/matches/${matchId}/maps/${mapId}`);
        const w1 = data.score_team1 > data.score_team2;
        panelEl.innerHTML = `
          <div class="map-scoreline">
            <div class="msl-team">
              <img class="msl-logo" src="${logoSrc(data.team1?.logo_url)}" onerror="this.style.opacity='.3'"/>
              <span>${data.team1?.short_name||data.team1?.name||t1}</span>
            </div>
            <div class="msl-score">
              <span class="${w1?'winner-score':'loser-score'}">${data.score_team1??0}</span>
              <span style="color:var(--text3);font-size:32px"> : </span>
              <span class="${!w1?'winner-score':'loser-score'}">${data.score_team2??0}</span>
            </div>
            <div class="msl-team right">
              <img class="msl-logo" src="${logoSrc(data.team2?.logo_url)}" onerror="this.style.opacity='.3'"/>
              <span>${data.team2?.short_name||data.team2?.name||t2}</span>
            </div>
          </div>
          ${statsTableHtml(data.team1?.players_stats, data.team1)}
          ${statsTableHtml(data.team2?.players_stats, data.team2)}`;
      } catch(e) {
        panelEl.innerHTML = '<div class="error-box">// ERR: Не удалось загрузить статистику</div>';
      }
    }

    async function loadMatch() {
      const main = document.getElementById('main');
      if (!matchId) { main.innerHTML = '<div class="section"><div class="error-box">// ERR: id не указан</div></div>'; return; }
      main.innerHTML = '<div class="section"><div class="loading"><div class="spinner"></div><div class="loading-text">ЗАГРУЗКА МАТЧА...</div></div></div>';

      try {
        const m = await apiFetch(`/matches/${matchId}`);
        document.title = `${m.team1?.name} vs ${m.team2?.name} — Astana PGL 2026`;

        const sc = statusClass(m.status), sl = statusLabel(m.status);
        const isResult = ['finished','completed','live','ongoing'].includes(m.status?.toLowerCase());
        const scoreHtml = isResult
          ? `<div class="ms-score">${m.score_team1??0} : ${m.score_team2??0}</div>`
          : `<div class="ms-score tbd">VS</div>`;

        const winnerHtml = m.winner ? `
          <div class="winner-banner">
            <img class="winner-logo" src="${logoSrc(m.winner.logo_url)}" onerror="this.style.opacity='.3'"/>
            ПОБЕДИТЕЛЬ: ${m.winner.name.toUpperCase()}
          </div>` : '';

        let mapsHtml = '';
        if (m.maps && m.maps.length > 0) {
          const tabsHtml = m.maps.map((map, i) => `
            <button class="map-tab${i===0?' active':''}" data-idx="${i}">
              MAP ${map.map_order} · ${map.map_name}
              ${map.score_team1!=null?`<span class="map-tab-score">${map.score_team1}:${map.score_team2}</span>`:''}
            </button>`).join('');

          const panelsHtml = m.maps.map((map, i) => `
            <div class="map-content${i===0?' active':''}" id="map-panel-${i}" data-map-id="${map.id}">
              <div class="map-header">
                <h2 class="map-title">${map.map_name}</h2>
                <div class="map-pick-info">
                  ${map.picked_by ? `ПИКНУЛА: ${map.picked_by.name}` : ''}
                  ${map.winner ? ` · ПОБЕДИТЕЛЬ: ${map.winner.name}` : ''}
                </div>
              </div>
              <div class="map-stats-container"></div>
            </div>`).join('');

          mapsHtml = `
            <div class="maps-section">
              <div style="max-width:1300px;margin:0 auto">
                <div class="maps-tabs">${tabsHtml}</div>
                ${panelsHtml}
              </div>
            </div>`;
        }

        main.innerHTML = `
          <div class="match-hero-wrap">
            <div class="match-hero-wrap-bg"></div>
            <div class="match-hero-inner">
              <div class="breadcrumb">
                <a href="/static/matches.html">МАТЧИ</a>
                <span class="breadcrumb-sep">›</span>
                <span class="breadcrumb-current">${m.team1?.name} VS ${m.team2?.name}</span>
              </div>
              <div class="match-scoreboard">
                <div class="ms-team">
                  <img class="ms-logo" src="${logoSrc(m.team1?.logo_url)}" onerror="this.style.opacity='.3'"/>
                  <h1 class="ms-name">${m.team1?.name||'?'}</h1>
                  <div class="ms-region">
                    ${m.team1?.country_code?`<img class="ms-flag" src="/static/flags/${m.team1.country_code.toLowerCase()}.svg" onerror="this.style.display='none'"/>`:''}
                    ${m.team1?.region||''}
                  </div>
                </div>
                <div class="ms-center">
                  <div class="ms-vs">${sl}</div>
                  ${scoreHtml}
                  <div class="ms-meta">
                    <span class="ms-badge">${m.bo_type||''}</span>
                    <span class="ms-badge">${m.stage||''}</span>
                    <span class="ms-badge">${fmtDate(m.start_time)}</span>
                  </div>
                  ${winnerHtml}
                </div>
                <div class="ms-team">
                  <img class="ms-logo" src="${logoSrc(m.team2?.logo_url)}" onerror="this.style.opacity='.3'"/>
                  <h1 class="ms-name">${m.team2?.name||'?'}</h1>
                  <div class="ms-region">
                    ${m.team2?.country_code?`<img class="ms-flag" src="/static/flags/${m.team2.country_code.toLowerCase()}.svg" onerror="this.style.display='none'"/>`:''}
                    ${m.team2?.region||''}
                  </div>
                </div>
              </div>
            </div>
          </div>
          ${mapsHtml}
          <div style="height:60px"></div>`;

        // Tabs logic
        if (m.maps && m.maps.length) {
          // Load first map stats immediately
          const firstPanel = document.getElementById('map-panel-0');
          const firstContainer = firstPanel.querySelector('.map-stats-container');
          loadMapStats(matchId, m.maps[0].id, firstContainer, m.team1?.name, m.team2?.name);

          document.querySelectorAll('.map-tab').forEach(tab => {
            tab.addEventListener('click', () => {
              const idx = parseInt(tab.dataset.idx);
              document.querySelectorAll('.map-tab').forEach(t => t.classList.remove('active'));
              document.querySelectorAll('.map-content').forEach(c => c.classList.remove('active'));
              tab.classList.add('active');
              const panel = document.getElementById(`map-panel-${idx}`);
              panel.classList.add('active');
              const container = panel.querySelector('.map-stats-container');
              if (!container.innerHTML) {
                loadMapStats(matchId, m.maps[idx].id, container, m.team1?.name, m.team2?.name);
              }
            });
          });
        }

      } catch(e) {
        main.innerHTML = `<div class="section"><div class="error-box">// ERR: Матч #${matchId} не найден</div></div>`;
      }
    }

    loadMatch();
  </script>
</body>
</html>

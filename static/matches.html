<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Матчи — Astana PGL 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Chakra+Petch:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .page-hero { padding: 80px 40px 40px; background: linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%); border-bottom: 1px solid var(--border); }
    .page-hero-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: .3em; color: var(--accent); margin-bottom: 8px; }
    .page-hero-label::before { content: '// '; }
    .page-hero-title { font-size: clamp(48px, 8vw, 100px); }
    .matches-list { display: flex; flex-direction: column; gap: 12px; }
    .match-row {
      background: var(--panel); border: 1px solid var(--border);
      padding: 20px 24px; display: grid;
      grid-template-columns: 140px 1fr auto 1fr 100px;
      align-items: center; gap: 16px;
      transition: border-color .2s, transform .15s;
      cursor: pointer; text-decoration: none; color: inherit;
    }
    .match-row:hover { border-color: var(--accent); transform: translateX(4px); }
    .match-row-stage { font-family: var(--font-mono); font-size: 10px; letter-spacing: .1em; color: var(--text3); }
    .match-row-bo { font-family: var(--font-mono); font-size: 10px; color: var(--text3); margin-top: 2px; }
    .match-row-team { display: flex; align-items: center; gap: 10px; font-family: var(--font-head); font-size: 20px; }
    .match-row-team.right { flex-direction: row-reverse; justify-content: flex-start; }
    .match-row-logo { width: 32px; height: 32px; object-fit: contain; }
    .match-row-score { text-align: center; font-family: var(--font-head); font-size: 28px; color: var(--accent); white-space: nowrap; }
    .match-row-score.upcoming { color: var(--text3); font-size: 16px; letter-spacing: .1em; }
    .match-row-right { text-align: right; }
    .match-row-time { font-family: var(--font-mono); font-size: 10px; color: var(--text3); }
    .day-divider {
      font-family: var(--font-mono); font-size: 10px; letter-spacing: .3em; color: var(--text3);
      padding: 20px 0 8px; display: flex; align-items: center; gap: 16px;
    }
    .day-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    @media(max-width:768px) {
      .match-row { grid-template-columns: 1fr; gap: 12px; }
      .match-row-team.right { flex-direction: row; }
    }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <div class="page-hero">
    <div class="page-hero-label">РЕЗУЛЬТАТЫ И РАСПИСАНИЕ</div>
    <h1 class="page-hero-title">МАТЧИ</h1>
  </div>

  <div class="section">
    <div class="filter-bar" id="statusFilter">
      <button class="filter-btn active" data-status="ALL">ВСЕ</button>
      <button class="filter-btn" data-status="live">🔴 LIVE</button>
      <button class="filter-btn" data-status="upcoming">📅 СКОРО</button>
      <button class="filter-btn" data-status="finished">✓ ЗАВЕРШЁННЫЕ</button>
    </div>
    <div id="matchesContainer"></div>
  </div>

  <div id="footer-placeholder"></div>
  <script src="js/utils.js"></script>
  <script>
    document.getElementById('nav-placeholder').innerHTML = renderNav();
    document.getElementById('footer-placeholder').innerHTML = renderFooter();

    let allMatches = [];
    let activeStatus = 'ALL';

    function groupByDay(matches) {
      const groups = {};
      matches.forEach(m => {
        const key = m.start_time ? new Date(m.start_time).toLocaleDateString('ru-RU', {day:'2-digit',month:'long',year:'numeric'}) : 'Дата не указана';
        if (!groups[key]) groups[key] = [];
        groups[key].push(m);
      });
      return groups;
    }

    function matchRowHtml(m) {
      const sc = statusClass(m.status);
      const sl = statusLabel(m.status);
      const isFinished = ['finished','completed'].includes(m.status?.toLowerCase());
      const isLive = ['live','ongoing'].includes(m.status?.toLowerCase());
      const scoreHtml = isFinished || isLive
        ? `<div class="match-row-score">${m.score_team1??0} : ${m.score_team2??0}</div>`
        : `<div class="match-row-score upcoming">VS</div>`;

      return `<a href="/static/match.html?id=${m.id}" class="match-row">
        <div>
          <div class="match-row-stage">${m.stage||''}</div>
          <div class="match-row-bo">${m.bo_type||''}</div>
          <span class="match-status ${sc}" style="margin-top:6px;display:inline-block">${sl}</span>
        </div>
        <div class="match-row-team">
          <img class="match-row-logo" src="${logoSrc(m.team1?.logo_url)}" alt="${m.team1?.name}" onerror="this.style.opacity='.2'"/>
          <span>${m.team1?.name||'?'}</span>
        </div>
        ${scoreHtml}
        <div class="match-row-team right">
          <img class="match-row-logo" src="${logoSrc(m.team2?.logo_url)}" alt="${m.team2?.name}" onerror="this.style.opacity='.2'"/>
          <span>${m.team2?.name||'?'}</span>
        </div>
        <div class="match-row-right">
          <div class="match-row-time">${fmtDateShort(m.start_time)}</div>
        </div>
      </a>`;
    }

    function renderMatches() {
      const container = document.getElementById('matchesContainer');
      let filtered = allMatches;
      if (activeStatus !== 'ALL') {
        const map = { live: ['live','ongoing'], upcoming: ['upcoming','scheduled'], finished: ['finished','completed'] };
        const vals = map[activeStatus] || [];
        filtered = allMatches.filter(m => vals.includes(m.status?.toLowerCase()));
      }
      if (!filtered.length) {
        container.innerHTML = '<div class="empty"><div class="empty-icon">📅</div>Нет матчей в этой категории</div>';
        return;
      }

      // Sort: live first, then upcoming by date, then finished (newest first)
      filtered.sort((a, b) => {
        const order = m => {
          const s = m.status?.toLowerCase();
          if (['live','ongoing'].includes(s)) return 0;
          if (['upcoming','scheduled'].includes(s)) return 1;
          return 2;
        };
        const oa = order(a), ob = order(b);
        if (oa !== ob) return oa - ob;
        return new Date(a.start_time||0) - new Date(b.start_time||0);
      });

      const groups = groupByDay(filtered);
      let html = '<div class="matches-list">';
      for (const [day, matches] of Object.entries(groups)) {
        html += `<div class="day-divider">${day}</div>`;
        html += matches.map(matchRowHtml).join('');
      }
      html += '</div>';
      container.innerHTML = html;
    }

    async function loadMatches() {
      const container = document.getElementById('matchesContainer');
      renderLoading(container);
      try {
        allMatches = await apiFetch('/matches');
        document.getElementById('statusFilter').addEventListener('click', e => {
          const btn = e.target.closest('.filter-btn');
          if (!btn) return;
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeStatus = btn.dataset.status;
          renderMatches();
        });
        renderMatches();
      } catch(e) {
        renderError(container, 'Не удалось загрузить матчи');
      }
    }

    loadMatches();
  </script>
</body>
</html>
